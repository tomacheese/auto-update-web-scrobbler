name: Release

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
    paths:
      - .github/workflows/release.yml
  pull_request_target:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed

defaults:
  run:
    shell: bash

jobs:
  post-approval-request:
    name: Post approval request
    runs-on: ubuntu-latest
    # フォーク PR かつ未マージの場合のみ承認リクエストを投稿する（同一リポジトリからの PR ・マージ済み PR は不要）
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.merged != true
    permissions:
      pull-requests: write
    steps:
      - name: Find existing approval request comment
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Environment 承認待ち

      - name: Post or update approval request comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Environment 承認待ち

            この PR のビルドを実行するには、Environment `fork-pr-build` の承認が必要です。

            [Actions run を確認して承認してください](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}?pr=${{ github.event.pull_request.number }})

  # バージョンを計算する
  calc-version:
    name: Calculate next version
    runs-on: ubuntu-latest
    needs: post-approval-request
    # post-approval-request が skipped（push ・同一リポジトリ PR 等）または success（フォーク PR）のときのみ実行する
    if: always() && (needs.post-approval-request.result == 'success' || needs.post-approval-request.result == 'skipped')
    # フォーク PR かつ未マージの場合のみ Environment で手動承認が必要（同一リポジトリからの PR ・マージ済み PR は不要）
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.merged != true && 'fork-pr-build' || null }}
    permissions:
      contents: write

    outputs:
      # バージョン
      version: ${{ steps.tag-version.outputs.new_version }}
      # バージョンタグ
      tag: ${{ steps.tag-version.outputs.new_tag }}
      # リリースノート
      changelog: ${{ steps.tag-version.outputs.changelog }}

    steps:
      - name: 📥 Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # マージされていない時には github.event.pull_request.head.sha を使い、マージされた時には github.base_ref を使う
          ref: ${{ github.event.pull_request.merged == true && github.base_ref || github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🏷️ Bump version and push tag
        id: tag-version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: 'minor'
          custom_release_rules: 'feat:minor:✨ Features,fix:patch:🐛 Fixes,docs:patch:📰 Docs,chore:patch:🎨 Chore,pref:patch:🎈 Performance improvements,refactor:patch:🧹 Refactoring,build:patch:🔍 Build,ci:patch:🔍 CI,revert:patch:⏪ Revert,style:patch:🧹 Style,test:patch:👀 Test,release:major:📦 Release'
          dry_run: ${{ github.event.pull_request.merged == true && 'false' || 'true' }}

  release:
    name: Release ${{ needs.calc-version.outputs.tag }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    needs:
      - calc-version
    permissions:
      contents: write

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: 📦 Create Release
        id: create_release
        uses: ncipollo/release-action@v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ needs.calc-version.outputs.tag }}
          name: ${{ needs.calc-version.outputs.tag }}
          body: ${{ needs.calc-version.outputs.changelog }}
          draft: false
          prerelease: false

  upload-package:
    name: Upload package ${{ needs.calc-version.outputs.tag }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}-latest
    if: github.event.pull_request.merged == true
    needs:
      - calc-version
      - release
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu, windows, macos]
      fail-fast: false

    steps:
      - name: 📥 Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # マージされていない時には github.event.pull_request.head.sha を使い、マージされた時には github.base_ref を使う
          ref: ${{ github.event.pull_request.merged == true && github.base_ref || github.event.pull_request.head.sha }}

      - name: 📂 Check exists .node-version
        id: check-node-version-file
        run: |
          if [ ! -f ".node-version" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Setup node env
        uses: actions/setup-node@v6
        if: ${{ steps.check-node-version-file.outputs.exists == 'true' }}
        with:
          node-version-file: .node-version

      - name: 🏗️ Setup node env
        if: ${{ steps.check-node-version-file.outputs.exists == 'false' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 📝 Check package manager
        id: check-package-manager
        run: |
          if [ -f "yarn.lock" ]; then
            echo "package-manager=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "package-manager=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "package-manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        if: ${{ steps.check-package-manager.outputs.package-manager == 'pnpm' }}
        with:
          run_install: false

      - name: 📦 Install dependencies
        run: |
          if [ "${{ steps.check-package-manager.outputs.package-manager }}" == "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "${{ steps.check-package-manager.outputs.package-manager }}" == "pnpm" ]; then
            pnpm install --frozen-lockfile --prefer-frozen-lockfile
          else
            npm install
          fi

      - name: 🎁 Run package
        run: |
          if [ "${{ steps.check-package-manager.outputs.package-manager }}" == "yarn" ]; then
            yarn package
          elif [ "${{ steps.check-package-manager.outputs.package-manager }}" == "pnpm" ]; then
            pnpm run package
          else
            npm run package
          fi

      - name: 📦 Create zip (for ubuntu or macos)
        id: create-zip
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'macos' }}
        run: |
          REPO="${GITHUB_REPOSITORY#"${GITHUB_REPOSITORY_OWNER}/"}"
          ZIP_FILENAME=${REPO}_${{ needs.calc-version.outputs.tag }}-${{ matrix.os }}.zip
          ZIP_PATH=$(pwd)/output/${ZIP_FILENAME}
          cd output
          zip -r ${ZIP_PATH} ./*
          echo "zip-path=${ZIP_PATH}" >> $GITHUB_OUTPUT
          echo "zip-filename=${ZIP_FILENAME}" >> $GITHUB_OUTPUT

      - name: 📦 Create zip (for windows)
        id: create-zip-windows
        if: ${{ matrix.os == 'windows' }}
        shell: powershell
        run: |
          $REPO = "${env:GITHUB_REPOSITORY}".Split("/")[-1]
          $ZIP_FILENAME = "${REPO}_${env:VERSION}-${env:FILE_OS}.zip"
          $ZIP_PATH = "${env:GITHUB_WORKSPACE}\output\$ZIP_FILENAME"
          Compress-Archive -Path "${env:GITHUB_WORKSPACE}\output\*" -DestinationPath $ZIP_PATH
          echo "zip-path=$ZIP_PATH" >> $env:GITHUB_OUTPUT
          echo "zip-filename=$ZIP_FILENAME" >> $env:GITHUB_OUTPUT
        env:
          VERSION: ${{ needs.calc-version.outputs.tag }}
          FILE_OS: ${{ matrix.os }}

      - name: 📂 ls
        run: |
          pwd
          ls -la output

      - name: 📤 Upload Release Asset
        uses: shogo82148/actions-upload-release-asset@v1.10.0
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'macos' }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ${{ steps.create-zip.outputs.zip-path }}
          asset_name: ${{ steps.create-zip.outputs.zip-filename }}

      - name: 📤 Upload Release Asset
        uses: shogo82148/actions-upload-release-asset@v1.10.0
        if: ${{ matrix.os == 'windows' }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ${{ steps.create-zip-windows.outputs.zip-path }}
          asset_name: ${{ steps.create-zip-windows.outputs.zip-filename }}
